<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Places disponibles — Kanedi Kids</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: sans-serif; background: #F5F3FF; padding: 24px; color: #2C2C2C; }
    .header { background: #8A4CFF; border-radius: 16px; padding: 24px; margin-bottom: 24px; }
    .header-title { font-size: 22px; font-weight: 600; color: #FFFFFF; margin-bottom: 6px; }
    .header-sub { display: flex; align-items: center; gap: 8px; font-size: 13px; color: rgba(255,255,255,0.85); }
    .live-dot { width: 8px; height: 8px; border-radius: 50%; background: #FFFFFF; animation: pulse 1.5s infinite; flex-shrink: 0; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 14px; }
    .card { background: #FFFFFF; border-radius: 14px; padding: 18px; border: 1.5px solid #E8DEFF; }
    .card-waiting { opacity: 0.6; }
    .card-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; }
    .card-name { font-size: 15px; font-weight: 600; color: #2C2C2C; }
    .badge-places { background: #8A4CFF; color: #FFFFFF; font-size: 11px; font-weight: 500; padding: 4px 10px; border-radius: 20px; white-space: nowrap; }
    .badge-attente { background: #F5F3FF; color: #8A4CFF; font-size: 11px; padding: 4px 10px; border-radius: 20px; border: 1px solid #D4C5FF; }
    .card-row { display: flex; align-items: center; gap: 8px; font-size: 13px; color: #2C2C2C; margin-bottom: 5px; }
    .tags { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px; }
    .tag { background: #F5F3FF; color: #8A4CFF; font-size: 11px; padding: 3px 10px; border-radius: 20px; border: 1px solid #D4C5FF; }
    .note { font-size: 12px; color: #2C2C2C; opacity: 0.6; margin-top: 10px; font-style: italic; }
    .vide { text-align: center; padding: 40px 20px; color: #2C2C2C; opacity: 0.5; font-style: italic; }
    .erreur { background: #fff3cd; border: 1px solid #ffc107; padding: 12px; border-radius: 8px; font-size: 13px; color: #2C2C2C; }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-title">Places disponibles</div>
    <div class="header-sub">
      <span class="live-dot"></span>
      Mis à jour en temps réel — Kanedi Kids Luxembourg
    </div>
  </div>
  <div id="places-creches" class="grid"><p class="vide">Chargement...</p></div>

  <script>
    const API_KEY = "patdOBeyo0wZcbPHq" + ".1efbb13931cae086a456c61789f44cbaa7cb31e16beaedabf99caf46ba603cd5";
    const BASE_ID = "app0zlg67GXNa7xjB";
    const TABLE_ID = "tblLgTCx0aWIP0Pux";

    fetch(`https://api.airtable.com/v0/${BASE_ID}/${TABLE_ID}`, {
      headers: { Authorization: `Bearer ${API_KEY}` }
    })
    .then(r => r.json())
    .then(data => {
      const container = document.getElementById("places-creches");
      if (data.error) {
        container.innerHTML = `<div class="erreur">Erreur : ${data.error.message}</div>`;
        return;
      }
      const visibles = data.records.filter(r => r.fields["Visible sur le site"]);
      if (!visibles.length) {
        container.innerHTML = `<p class="vide">Aucune place disponible actuellement.</p>`;
        return;
      }
      container.innerHTML = visibles.map(r => {
        const f = r.fields;
        const nom = Array.isArray(f["Nom de la crèche"]) ? f["Nom de la crèche"][0] : "Crèche";
        const places = f["Places disponible"] || 0;
        const hasPlaces = places > 0;
        return `
          <div class="card ${hasPlaces ? '' : 'card-waiting'}">
            <div class="card-top">
              <span class="card-name">${nom}</span>
              ${hasPlaces
                ? `<span class="badge-places">${places} place${places > 1 ? 's' : ''}</span>`
                : `<span class="badge-attente">Liste d'attente</span>`}
            </div>
            ${f["Date de disponibilité"] ? `<div class="card-row">Dispo le ${f["Date de disponibilité"]}</div>` : ''}
            <div class="card-row">${f["Âge minimum (mois)"]} à ${f["Âge maximum (mois)"]} mois</div>
            <div class="tags">
              ${f["Type de contrat"] ? `<span class="tag">${f["Type de contrat"]}</span>` : ''}
            </div>
            ${f["Notes"] ? `<p class="note">${f["Notes"]}</p>` : ''}
          </div>`;
      }).join("");
    })
    .catch(err => {
      document.getElementById("places-creches").innerHTML = `<div class="erreur">Erreur réseau : ${err.message}</div>`;
    });
  </script>
</body>
</html>
