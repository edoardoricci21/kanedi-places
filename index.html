<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Places disponibles — Kanedi Kids</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Segoe UI',sans-serif;background:#F5F3FF;padding:28px;color:#2C2C2C}
    .hero{background:#8A4CFF;border-radius:24px;padding:32px 36px;margin-bottom:24px}
    .hero-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:20px}
    .hero-title{font-size:26px;font-weight:700;color:#fff;letter-spacing:-0.5px;margin-bottom:6px}
    .hero-live{display:inline-flex;align-items:center;gap:7px;background:rgba(255,255,255,0.12);border:1px solid rgba(255,255,255,0.2);border-radius:20px;padding:5px 14px}
    .live-dot{width:6px;height:6px;border-radius:50%;background:#fff;animation:pulse 1.5s infinite}
    .live-text{font-size:11px;color:rgba(255,255,255,0.9);letter-spacing:0.3px}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}
    .stat-big{font-size:48px;font-weight:700;color:#fff;line-height:1;letter-spacing:-2px;text-align:right}
    .stat-sub{font-size:11px;color:rgba(255,255,255,0.6);margin-top:4px;text-align:right;text-transform:uppercase;letter-spacing:0.5px}
    .divider-hero{height:1px;background:rgba(255,255,255,0.15);margin:20px 0}
    .timeline-nav{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
    .nav-label{font-size:12px;color:rgba(255,255,255,0.7);margin-right:4px;white-space:nowrap}
    .months-row{display:flex;gap:6px;flex-wrap:wrap;flex:1}
    .month-btn{background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.15);border-radius:10px;padding:7px 14px;font-size:12px;color:rgba(255,255,255,0.75);cursor:pointer;white-space:nowrap}
    .month-btn.active{background:#fff;color:#8A4CFF;font-weight:600;border-color:#fff}
    .month-btn.has-places{border-color:rgba(255,255,255,0.4)}
    .dot-count{display:inline-block;width:16px;height:16px;border-radius:50%;background:rgba(255,255,255,0.25);font-size:9px;font-weight:700;line-height:16px;text-align:center;margin-left:5px;vertical-align:middle}
    .month-btn.active .dot-count{background:#8A4CFF;color:#fff}
    .reset-btn{background:transparent;border:1px solid rgba(255,255,255,0.2);border-radius:10px;padding:7px 12px;font-size:11px;color:rgba(255,255,255,0.6);cursor:pointer;white-space:nowrap}
    .filter-info{font-size:11px;color:rgba(255,255,255,0.5);margin-top:10px}
    .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:16px}
    .card{background:#fff;border-radius:20px;overflow:hidden;border:1.5px solid #EDE8FF}
    .card-photo{width:100%;height:160px;object-fit:cover;display:block}
    .card-photo-placeholder{width:100%;height:160px;background:#F5F3FF;display:flex;align-items:center;justify-content:center}
    .card-badge-wrap{position:relative;margin-top:-18px;padding:0 18px;margin-bottom:4px;display:flex;justify-content:flex-end}
    .badge-wrap{display:flex;flex-direction:column;align-items:flex-end;gap:3px}
    .badge-count{font-size:11px;font-weight:700;padding:5px 13px;border-radius:20px;border:2px solid #fff;white-space:nowrap;cursor:pointer;display:inline-flex;align-items:center;gap:5px}
    .badge-count.dispo{background:#AAB3FF;color:#3730a3}
    .badge-count.bientot{background:#C4B5FD;color:#4c1d95}
    .badge-count.dernier{background:#8E8EDB;color:#fff}
    .badge-count.complet{background:#E5E5E5;color:#5A5A5A;cursor:default}
    .badge-hint{font-size:10px;padding-right:2px;display:flex;align-items:center;gap:3px}
    .badge-hint.dispo{color:#6366f1}
    .badge-hint.bientot{color:#7c3aed}
    .badge-hint.dernier{color:#4f46e5}
    .badge-hint.complet{color:#888}
    .card-body{padding:16px 20px 20px}
    .cname{font-size:15px;font-weight:700;color:#2C2C2C;margin-bottom:12px}
    .detail-panel{border-radius:12px;overflow:hidden;margin-bottom:12px;max-height:0px;transition:max-height 0.35s ease}
    .detail-panel.dispo{background:#F0F1FF;border:1px solid #C7CBFF}
    .detail-panel.bientot{background:#F3F0FF;border:1px solid #D4C5FF}
    .detail-panel.dernier{background:#EEEEFF;border:1px solid #8E8EDB}
    .detail-header{padding:8px 13px;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:0.8px;border-bottom:1px solid rgba(0,0,0,0.06)}
    .detail-header.dispo{color:#3730a3}
    .detail-header.bientot{color:#4c1d95}
    .detail-header.dernier{color:#3730a3}
    .contrat-row{display:flex;align-items:center;padding:9px 13px;border-bottom:1px solid rgba(0,0,0,0.05);gap:9px}
    .contrat-row:last-child{border-bottom:none}
    .contrat-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
    .contrat-dot.dispo{background:#AAB3FF}
    .contrat-dot.bientot{background:#8E8EDB}
    .contrat-dot.dernier{background:#6366f1}
    .contrat-info{flex:1}
    .contrat-type{font-size:12px;font-weight:600;color:#2C2C2C}
    .contrat-age{font-size:10px;color:#6366f1;margin-top:2px}
    .contrat-date{font-size:9px;color:#2C2C2C;opacity:0.45;margin-top:2px;font-style:italic}
    .cp{font-size:10px;border-radius:20px;padding:3px 8px;font-weight:600;white-space:nowrap}
    .cp.dispo{background:#AAB3FF;color:#3730a3}
    .cp.bientot{background:#C4B5FD;color:#4c1d95}
    .cp.dernier{background:#8E8EDB;color:#fff}
    .complet-box{background:#F5F5F5;border:1px solid #E0E0E0;border-radius:12px;padding:12px 14px;margin-bottom:10px}
    .complet-title{font-size:12px;font-weight:700;color:#5A5A5A;margin-bottom:4px}
    .complet-sub{font-size:11px;color:#888;line-height:1.5}
    .attente-btn{width:100%;padding:9px;border-radius:10px;border:1.5px solid #C4B5FD;background:#F5F3FF;color:#8A4CFF;font-size:11px;font-weight:600;cursor:pointer;margin-bottom:12px;text-align:center;display:block}
    .maps-chip{display:flex;align-items:center;gap:8px;background:#F5F3FF;border:1px solid #E0D5FF;border-radius:12px;padding:10px 13px;margin-bottom:10px;text-decoration:none}
    .maps-chip:hover{background:#EDE8FF}
    .maps-icon{width:28px;height:28px;border-radius:7px;background:#8A4CFF;display:flex;align-items:center;justify-content:center;flex-shrink:0}
    .maps-label{font-size:9px;color:#8A4CFF;font-weight:700;text-transform:uppercase;letter-spacing:0.8px;margin-bottom:2px}
    .maps-val{font-size:11px;color:#2C2C2C;font-weight:500}
    .maps-cta{font-size:10px;color:#8A4CFF;font-weight:600;margin-left:auto;white-space:nowrap}
    .date-chip{display:flex;align-items:center;gap:10px;background:#F5F3FF;border:1px solid #E0D5FF;border-radius:12px;padding:10px 13px;margin-bottom:10px}
    .date-chip-icon{width:28px;height:28px;border-radius:7px;background:#8A4CFF;display:flex;align-items:center;justify-content:center;flex-shrink:0}
    .date-chip-label{font-size:9px;color:#8A4CFF;font-weight:700;text-transform:uppercase;letter-spacing:0.8px;margin-bottom:2px}
    .date-chip-val{font-size:12px;color:#2C2C2C;font-weight:600}
    .elbl{font-size:9px;font-weight:700;color:#8A4CFF;text-transform:uppercase;letter-spacing:0.8px;margin-bottom:7px}
    .epills{display:flex;flex-wrap:wrap;gap:5px;align-items:center}
    .epill{display:inline-flex;align-items:center;gap:4px;background:#F5F3FF;border:1px solid #E8E0FF;border-radius:20px;padding:4px 10px;font-size:11px;color:#2C2C2C}
    .epill-more{display:inline-flex;align-items:center;background:#EDE8FF;border:1px solid #C4B5FD;border-radius:20px;padding:4px 9px;font-size:10px;color:#6A4CCC;font-weight:600}
    .note{font-size:11px;color:#2C2C2C;opacity:0.4;margin-top:12px;font-style:italic;padding-top:12px;border-top:1px solid #F0EDFF}
    .empty-state{background:#fff;border-radius:20px;padding:40px;text-align:center;border:1.5px solid #EDE8FF;grid-column:1/-1}
    .empty-title{font-size:16px;font-weight:600;color:#8A4CFF;margin-bottom:6px}
    .empty-sub{font-size:13px;color:#2C2C2C;opacity:0.45}
    .footer{text-align:center;margin-top:20px;font-size:11px;color:#2C2C2C;opacity:0.3;letter-spacing:0.3px}
    .vide{text-align:center;padding:40px;color:#2C2C2C;opacity:0.5;font-style:italic}
    .erreur{background:#fff3cd;border:1px solid #ffc107;padding:12px;border-radius:8px;font-size:13px}
  </style>
</head>
<body>
  <div class="hero">
    <div class="hero-top">
      <div>
        <div class="hero-title">Places disponibles</div>
        <div class="hero-live"><span class="live-dot"></span><span class="live-text">Mis &#224; jour en temps r&#233;el &#8212; Kanedi Kids</span></div>
      </div>
      <div><div class="stat-big" id="total-places">&#8212;</div><div class="stat-sub">places dispo</div></div>
    </div>
    <div class="divider-hero"></div>
    <div class="timeline-nav">
      <span class="nav-label">Disponible en</span>
      <div class="months-row" id="months-row"></div>
      <button class="reset-btn" onclick="reset()">Tout voir</button>
    </div>
    <div class="filter-info" id="filter-info">Toutes les cr&#232;ches &#8212; s&#233;lectionnez un mois pour filtrer</div>
  </div>
  <div id="places-creches" class="grid"><p class="vide">Chargement...</p></div>
  <div class="footer">Kanedi Kids Luxembourg &#8212; kanedikids.lu</div>

  <script>
    var API_KEY = "patG98sTaAHV0SFN7" + ".d308c154a59a558d3f2dbbea097676a20ad1b17970478a0175b262a7645c6875";
    var BASE_ID = "app0zlg67GXNa7xjB";
    var TABLE_ID = "tblLgTCx0aWIP0Pux";
    var MOIS = ["","Janvier","F\u00e9vrier","Mars","Avril","Mai","Juin","Juillet","Ao\u00fbt","Septembre","Octobre","Novembre","D\u00e9cembre"];

    var equipements = [
      { champ: "Allaitement accept\u00e9", label: "Allaitement", emoji: "\ud83e\udd31" },
      { champ: "Couches fournies", label: "Couches", emoji: "\ud83e\uddf7" },
      { champ: "Cam\u00e9ra", label: "Cam\u00e9ra", emoji: "\ud83d\udcf7" },
      { champ: "Jardin", label: "Jardin", emoji: "\ud83c\udf3f" },
      { champ: "Sorties", label: "Sorties", emoji: "\ud83d\udeb6" },
      { champ: "Label qualit\u00e9", label: "Label", emoji: "\ud83c\udfc5" },
      { champ: "Cuisine sur place", label: "Cuisine", emoji: "\ud83c\udf7d\ufe0f" },
      { champ: "Application parents", label: "App parents", emoji: "\ud83d\udcf1" }
    ];

    var contrats = [
      { label: "Temps plein", places: "Places temps plein", ageMin: "\u00c2ge min temps plein", ageMax: "\u00c2ge max temps plein", date: "Date temps plein" },
      { label: "Mi-temps",    places: "Places mi-temps",    ageMin: "\u00c2ge min mi-temps",    ageMax: "\u00c2ge max mi-temps",    date: "Date mi-temps" },
      { label: "Occasionnel", places: "Places occasionnel", ageMin: "\u00c2ge min occasionnel", ageMax: "\u00c2ge max occasionnel", date: "Date occasionnel" }
    ];

    function getEtat(places) {
      if (places >= 5) return "dispo";
      if (places >= 3) return "bientot";
      if (places >= 1) return "dernier";
      return "complet";
    }

    function getBadgeLabel(places) {
      if (places >= 5) return places + " places disponibles";
      if (places >= 3) return places + " places disponibles";
      if (places === 1) return "1 place disponible";
      if (places >= 1) return places + " places disponibles";
      return "Complet pour le moment";
    }

    function getHintLabel(places) {
      if (places >= 5) return "Voir le d\u00e9tail des contrats \u2192";
      if (places >= 3) return "Bient\u00f4t complet \u00b7 Voir le d\u00e9tail \u2192";
      if (places >= 1) return "Derni\u00e8res places \u00b7 Voir le d\u00e9tail \u2192";
      return "Inscrivez-vous en liste d\u2019attente";
    }

    function calIcon(stroke) {
      return "<svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"" + stroke + "\" stroke-width=\"2\" width=\"13\" height=\"13\"><rect x=\"3\" y=\"4\" width=\"18\" height=\"18\" rx=\"2\"/><line x1=\"16\" y1=\"2\" x2=\"16\" y2=\"6\"/><line x1=\"8\" y1=\"2\" x2=\"8\" y2=\"6\"/><line x1=\"3\" y1=\"10\" x2=\"21\" y2=\"10\"/></svg>";
    }

    function mapIcon() {
      return "<svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#fff\" stroke-width=\"2\" width=\"13\" height=\"13\"><path d=\"M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z\"/><circle cx=\"12\" cy=\"10\" r=\"3\"/></svg>";
    }

    function getMois(d) { return d ? d.substring(0, 7) : ""; }

    function formatMoisLabel(v) {
      var parts = v.split("-");
      return MOIS[parseInt(parts[1])] + " " + parts[0];
    }

    function formatDate(d) {
      if (!d) return "";
      var parts = d.split("-");
      if (parts.length === 3) return parseInt(parts[2]) + " " + MOIS[parseInt(parts[1])] + " " + parts[0];
      return d;
    }

    function getPhotoUrl(f) {
      var champs = ["Photo cr\u00e8ches","Photo Cr\u00e8ches","Photo cr\u00e8che","Photo Cr\u00e8che","photo (\u00e0 partir de...)","Photo"];
      for (var c = 0; c < champs.length; c++) {
        var field = f[champs[c]];
        if (!field) continue;
        if (Array.isArray(field) && field.length > 0) {
          var item = field[0];
          if (item && item.url) return item.url;
          if (item && item.thumbnails) {
            if (item.thumbnails.large) return item.thumbnails.large.url;
            if (item.thumbnails.full) return item.thumbnails.full.url;
            if (item.thumbnails.small) return item.thumbnails.small.url;
          }
        }
      }
      return "";
    }

    function getAdresse(f) {
      var val = f["Adresse"];
      if (!val) return "";
      if (Array.isArray(val)) return val[0] || "";
      return val;
    }

    function toggleDetail(id) {
      var panel = document.getElementById("panel-" + id);
      if (!panel) return;
      var isOpen = panel.style.maxHeight && panel.style.maxHeight !== "0px";
      panel.style.maxHeight = isOpen ? "0px" : panel.scrollHeight + 20 + "px";
    }

    var allRecords = [];
    var activeMonth = "";

    function buildMonthBtns() {
      var map = {};
      for (var i = 0; i < allRecords.length; i++) {
        var r = allRecords[i];
        var m = getMois(r.fields["Date de disponibilit\u00e9"]);
        var p = r.fields["Places disponible"] || 0;
        if (m && p > 0) { map[m] = (map[m] || 0) + p; }
      }
      var row = document.getElementById("months-row");
      row.innerHTML = "";
      var keys = Object.keys(map).sort();
      for (var j = 0; j < keys.length; j++) {
        var key = keys[j];
        var btn = document.createElement("button");
        btn.className = "month-btn has-places";
        btn.dataset.val = key;
        btn.innerHTML = formatMoisLabel(key) + " <span class=\"dot-count\">" + map[key] + "</span>";
        btn.setAttribute("onclick", "selectMonth('" + key + "')");
        row.appendChild(btn);
      }
    }

    function selectMonth(val) {
      activeMonth = val;
      var btns = document.querySelectorAll(".month-btn");
      for (var i = 0; i < btns.length; i++) {
        if (btns[i].dataset.val === val) { btns[i].classList.add("active"); }
        else { btns[i].classList.remove("active"); }
      }
      renderCards();
    }

    function reset() {
      activeMonth = "";
      var btns = document.querySelectorAll(".month-btn");
      for (var i = 0; i < btns.length; i++) { btns[i].classList.remove("active"); }
      renderCards();
    }

    function renderCards() {
      var container = document.getElementById("places-creches");
      var visibles = allRecords.filter(function(r) { return r.fields["Visible sur le site"]; });
      var total = 0;
      for (var i = 0; i < visibles.length; i++) { total += visibles[i].fields["Places disponible"] || 0; }
      document.getElementById("total-places").textContent = total;

      var info = document.getElementById("filter-info");
      var filtered = visibles;
      var hasReal = false;

      if (activeMonth) {
        filtered = visibles.filter(function(r) {
          var m = getMois(r.fields["Date de disponibilit\u00e9"] || "");
          var p = r.fields["Places disponible"] || 0;
          return p === 0 || (m && m <= activeMonth);
        });
        for (var j = 0; j < visibles.length; j++) {
          var mj = getMois(visibles[j].fields["Date de disponibilit\u00e9"] || "");
          var pj = visibles[j].fields["Places disponible"] || 0;
          if (pj > 0 && mj && mj <= activeMonth) { hasReal = true; break; }
        }
        info.textContent = "Places disponibles en " + formatMoisLabel(activeMonth) + " \u2014 " + filtered.length + " cr\u00e8che" + (filtered.length > 1 ? "s" : "") + " affich\u00e9e" + (filtered.length > 1 ? "s" : "");
      } else {
        info.textContent = "Toutes les cr\u00e8ches \u2014 s\u00e9lectionnez un mois pour filtrer";
      }

      var html = "";
      if (activeMonth && !hasReal) {
        html += "<div class=\"empty-state\"><div class=\"empty-title\">Aucune place disponible ce mois</div><div class=\"empty-sub\">Voici les prochaines disponibilit\u00e9s dans nos cr\u00e8ches</div></div>";
        filtered = visibles;
      }

      for (var k = 0; k < filtered.length; k++) {
        var f = filtered[k].fields;
        var rid = filtered[k].id;
        var nom = Array.isArray(f["Nom de la cr\u00e8che"]) ? f["Nom de la cr\u00e8che"][0] : "Cr\u00e8che";
        var places = f["Places disponible"] || 0;
        var etat = getEtat(places);
        var hasPlaces = places > 0;
        var dispo = formatDate(f["Date de disponibilit\u00e9"]);
        var photoUrl = getPhotoUrl(f);
        var adresse = getAdresse(f);
        var mapsUrl = adresse ? "https://www.google.com/maps/search/?api=1&query=" + encodeURIComponent(adresse + ", Luxembourg") : "";

        var activeEquip = [];
        for (var e = 0; e < equipements.length; e++) {
          var v = f[equipements[e].champ];
          var isActive = Array.isArray(v) ? v[0] === true : v === true;
          if (isActive) activeEquip.push(equipements[e]);
        }
        var equipHTML = "";
        var maxShow = 3;
        for (var ae = 0; ae < Math.min(activeEquip.length, maxShow); ae++) {
          equipHTML += "<span class=\"epill\">" + activeEquip[ae].emoji + " " + activeEquip[ae].label + "</span>";
        }
        if (activeEquip.length > maxShow) {
          equipHTML += "<span class=\"epill-more\">+" + (activeEquip.length - maxShow) + "</span>";
        }

        var detailHTML = "";
        for (var ct = 0; ct < contrats.length; ct++) {
          var c = contrats[ct];
          var cPlaces = f[c.places];
          var cMin = f[c.ageMin];
          var cMax = f[c.ageMax];
          var cDate = formatDate(f[c.date] || "");
          if (cPlaces && cPlaces > 0) {
            detailHTML += "<div class=\"contrat-row\">";
            detailHTML += "<div class=\"contrat-dot " + etat + "\"></div>";
            detailHTML += "<div class=\"contrat-info\">";
            detailHTML += "<div class=\"contrat-type\">" + c.label + "</div>";
            if (cMin !== undefined && cMax !== undefined) {
              detailHTML += "<div class=\"contrat-age\">" + cMin + " \u2013 " + cMax + " mois</div>";
            }
            if (cDate) {
              detailHTML += "<div class=\"contrat-date\">D\u00e8s le " + cDate + "</div>";
            }
            detailHTML += "</div>";
            detailHTML += "<span class=\"cp " + etat + "\">" + cPlaces + " place" + (cPlaces > 1 ? "s" : "") + "</span>";
            detailHTML += "</div>";
          }
        }

        var mapsHTML = "";
        if (mapsUrl) {
          mapsHTML += "<a href=\"" + mapsUrl + "\" target=\"_blank\" class=\"maps-chip\">";
          mapsHTML += "<div class=\"maps-icon\">" + mapIcon() + "</div>";
          mapsHTML += "<div style=\"flex:1;\"><div class=\"maps-label\">Adresse</div><div class=\"maps-val\">" + adresse + "</div></div>";
          mapsHTML += "<div class=\"maps-cta\">Voir sur la carte \u2192</div>";
          mapsHTML += "</a>";
        }

        var photoHTML = photoUrl
          ? "<img class=\"card-photo\" src=\"" + photoUrl + "\" alt=\"" + nom + "\" />"
          : "<div class=\"card-photo-placeholder\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#C4B5FD\" stroke-width=\"1\" width=\"40\" height=\"40\"><rect x=\"3\" y=\"3\" width=\"18\" height=\"18\" rx=\"2\"/><circle cx=\"8.5\" cy=\"8.5\" r=\"1.5\"/><polyline points=\"21 15 16 10 5 21\"/></svg></div>";

        html += "<div class=\"card\">" + photoHTML;
        html += "<div class=\"card-badge-wrap\"><div class=\"badge-wrap\">";

        if (hasPlaces) {
          html += "<button class=\"badge-count " + etat + "\" onclick=\"toggleDetail('" + rid + "')\">" + getBadgeLabel(places) + " \u25be</button>";
          html += "<div class=\"badge-hint " + etat + "\">" + getHintLabel(places) + "</div>";
        } else {
          html += "<span class=\"badge-count complet\">Complet pour le moment</span>";
          html += "<div class=\"badge-hint complet\">Inscrivez-vous en liste d\u2019attente</div>";
        }

        html += "</div></div>";
        html += "<div class=\"card-body\">";
        html += "<div class=\"cname\">" + nom + "</div>";

        if (hasPlaces && detailHTML) {
          html += "<div class=\"detail-panel " + etat + "\" id=\"panel-" + rid + "\" style=\"max-height:0px;\">";
          html += "<div class=\"detail-header " + etat + "\">D\u00e9tail par type de contrat</div>";
          html += detailHTML;
          html += "</div>";
        }

        if (!hasPlaces) {
          html += "<div class=\"complet-box\">";
          html += "<div class=\"complet-title\">Complet pour le moment</div>";
          html += "<div class=\"complet-sub\">Toutes les places sont occup\u00e9es. Rejoignez notre liste d\u2019attente et soyez inform\u00e9 d\u00e8s qu\u2019une place se lib\u00e8re.</div>";
          html += "</div>";
          html += "<a href=\"https://forms.fillout.com/t/2jq4m4rNNtus\" target=\"_blank\" class=\"attente-btn\" style=\"text-decoration:none;display:block;\">Rejoindre la liste d\u2019attente \u2192</a>";
        }

        html += mapsHTML;

        if (hasPlaces && dispo) {
          html += "<div class=\"date-chip\"><div class=\"date-chip-icon\">" + calIcon("#fff") + "</div>";
          html += "<div><div class=\"date-chip-label\">Premi\u00e8re disponibilit\u00e9</div><div class=\"date-chip-val\">" + dispo + "</div></div></div>";
        }

        if (equipHTML) { html += "<div class=\"elbl\">Services &amp; \u00e9quipements</div><div class=\"epills\">" + equipHTML + "</div>"; }
        if (f["Notes"]) { html += "<p class=\"note\">" + f["Notes"] + "</p>"; }
        html += "</div></div>";
      }
      container.innerHTML = html;
    }

    fetch("https://api.airtable.com/v0/" + BASE_ID + "/" + TABLE_ID, {
      headers: { Authorization: "Bearer " + API_KEY }
    })
    .then(function(r) { return r.json(); })
    .then(function(data) {
      if (data.error) {
        document.getElementById("places-creches").innerHTML = "<div class=\"erreur\">Erreur : " + data.error.message + "</div>";
        return;
      }
      allRecords = data.records;
      buildMonthBtns();
      renderCards();
    })
    .catch(function(err) {
      document.getElementById("places-creches").innerHTML = "<div class=\"erreur\">Erreur r\u00e9seau : " + err.message + "</div>";
    });
  </script>
</body>
</html>
