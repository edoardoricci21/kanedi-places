<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Places disponibles — Kanedi Kids</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Segoe UI',sans-serif;background:#F5F3FF;padding:28px;color:#2C2C2C}
    .hero{background:#8A4CFF;border-radius:24px;padding:32px 36px;margin-bottom:24px}
    .hero-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:20px}
    .hero-title{font-size:26px;font-weight:700;color:#fff;letter-spacing:-0.5px;margin-bottom:6px}
    .hero-live{display:inline-flex;align-items:center;gap:7px;background:rgba(255,255,255,0.12);border:1px solid rgba(255,255,255,0.2);border-radius:20px;padding:5px 14px}
    .live-dot{width:6px;height:6px;border-radius:50%;background:#fff;animation:pulse 1.5s infinite}
    .live-text{font-size:11px;color:rgba(255,255,255,0.9);letter-spacing:0.3px}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}
    .stat-big{font-size:48px;font-weight:700;color:#fff;line-height:1;letter-spacing:-2px;text-align:right}
    .stat-sub{font-size:11px;color:rgba(255,255,255,0.6);margin-top:4px;text-align:right;text-transform:uppercase;letter-spacing:0.5px}
    .divider-hero{height:1px;background:rgba(255,255,255,0.15);margin:20px 0}
    .timeline-nav{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
    .nav-label{font-size:12px;color:rgba(255,255,255,0.7);margin-right:4px;white-space:nowrap}
    .months-row{display:flex;gap:6px;flex-wrap:wrap;flex:1}
    .month-btn{background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.15);border-radius:10px;padding:7px 14px;font-size:12px;color:rgba(255,255,255,0.75);cursor:pointer;white-space:nowrap}
    .month-btn.active{background:#fff;color:#8A4CFF;font-weight:600;border-color:#fff}
    .month-btn.has-places{border-color:rgba(255,255,255,0.4)}
    .dot-count{display:inline-block;width:16px;height:16px;border-radius:50%;background:rgba(255,255,255,0.25);font-size:9px;font-weight:700;line-height:16px;text-align:center;margin-left:5px;vertical-align:middle}
    .month-btn.active .dot-count{background:#8A4CFF;color:#fff}
    .reset-btn{background:transparent;border:1px solid rgba(255,255,255,0.2);border-radius:10px;padding:7px 12px;font-size:11px;color:rgba(255,255,255,0.6);cursor:pointer;white-space:nowrap}
    .filter-info{font-size:11px;color:rgba(255,255,255,0.5);margin-top:10px}
    .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(290px,1fr));gap:14px}
    .card{background:#fff;border-radius:20px;overflow:hidden;border:1.5px solid #EDE8FF}
    .card-top-bar{height:4px;background:#8A4CFF}
    .card-top-bar-grey{height:4px;background:#E8E8E8}
    .card-body{padding:20px}
    .card-waiting{background:#FAFAFA;border-color:#EBEBEB;opacity:0.65}
    .card-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
    .card-left{display:flex;align-items:center;gap:10px}
    .avatar{width:36px;height:36px;border-radius:10px;background:#F5F3FF;display:flex;align-items:center;justify-content:center}
    .avatar-grey{background:#F0F0F0}
    .cname{font-size:15px;font-weight:600;color:#2C2C2C}
    .cname-grey{color:#AAAAAA}
    .badge{font-size:11px;font-weight:600;padding:5px 12px;border-radius:20px;white-space:nowrap}
    .bp{background:#8A4CFF;color:#fff}
    .bw{background:#F0EDFF;color:#8A4CFF;border:1px solid #D4C5FF}
    .date-chip{display:flex;align-items:center;gap:10px;background:#F5F3FF;border:1px solid #E0D5FF;border-radius:12px;padding:10px 14px;margin-bottom:12px}
    .date-chip-grey{background:#F5F5F5;border-color:#E8E8E8}
    .date-chip-icon{width:32px;height:32px;border-radius:8px;background:#8A4CFF;display:flex;align-items:center;justify-content:center;flex-shrink:0}
    .date-chip-icon-grey{background:#DDDDDD}
    .date-chip-label{font-size:9px;color:#8A4CFF;font-weight:700;text-transform:uppercase;letter-spacing:0.8px;margin-bottom:3px}
    .date-chip-label-grey{color:#BBBBBB}
    .date-chip-val{font-size:14px;color:#2C2C2C;font-weight:600}
    .date-chip-val-grey{color:#BBBBBB}
    .row2{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
    .ibox{background:#F5F3FF;border-radius:10px;padding:9px 12px}
    .ibox-grey{background:#F5F5F5}
    .ilbl{font-size:9px;font-weight:700;color:#8A4CFF;text-transform:uppercase;letter-spacing:0.8px;margin-bottom:3px}
    .ilbl-grey{color:#BBBBBB}
    .ival{font-size:13px;color:#2C2C2C;font-weight:500}
    .ival-grey{color:#BBBBBB}
    .elbl{font-size:9px;font-weight:700;color:#8A4CFF;text-transform:uppercase;letter-spacing:0.8px;margin-bottom:7px}
    .epills{display:flex;flex-wrap:wrap;gap:5px}
    .epill{display:inline-flex;align-items:center;gap:5px;background:#F5F3FF;border:1px solid #E8E0FF;border-radius:20px;padding:4px 10px;font-size:11px;color:#2C2C2C}
    .edot{width:5px;height:5px;border-radius:50%;background:#8A4CFF;flex-shrink:0}
    .note{font-size:11px;color:#2C2C2C;opacity:0.4;margin-top:12px;font-style:italic;padding-top:12px;border-top:1px solid #F0EDFF}
    .empty-state{background:#fff;border-radius:20px;padding:40px;text-align:center;border:1.5px solid #EDE8FF;grid-column:1/-1}
    .empty-title{font-size:16px;font-weight:600;color:#8A4CFF;margin-bottom:6px}
    .empty-sub{font-size:13px;color:#2C2C2C;opacity:0.45}
    .footer{text-align:center;margin-top:20px;font-size:11px;color:#2C2C2C;opacity:0.3;letter-spacing:0.3px}
    .vide{text-align:center;padding:40px;color:#2C2C2C;opacity:0.5;font-style:italic}
    .erreur{background:#fff3cd;border:1px solid #ffc107;padding:12px;border-radius:8px;font-size:13px}
  </style>
</head>
<body>
  <div class="hero">
    <div class="hero-top">
      <div>
        <div class="hero-title">Places disponibles</div>
        <div class="hero-live"><span class="live-dot"></span><span class="live-text">Mis à jour en temps réel — Kanedi Kids</span></div>
      </div>
      <div><div class="stat-big" id="total-places">—</div><div class="stat-sub">places dispo</div></div>
    </div>
    <div class="divider-hero"></div>
    <div class="timeline-nav">
      <span class="nav-label">Disponible en</span>
      <div class="months-row" id="months-row"></div>
      <button class="reset-btn" onclick="reset()">Tout voir</button>
    </div>
    <div class="filter-info" id="filter-info">Toutes les crèches — sélectionnez un mois pour filtrer</div>
  </div>

  <div id="places-creches" class="grid"><p class="vide">Chargement...</p></div>
  <div class="footer">Kanedi Kids Luxembourg — kanedikids.lu</div>

  <script>
    const API_KEY = "pat7OoZScI0QF4rxD" + ".07896b1f21c871d889a172400dbb86cdb3b305fd9fa0cdad9a07e364c13ffb6c";
    const BASE_ID = "app0zlg67GXNa7xjB";
    const TABLE_ID = "tblLgTCx0aWIP0Pux";
    const MOIS = ['','Janvier','Février','Mars','Avril','Mai','Juin','Juillet','Août','Septembre','Octobre','Novembre','Décembre'];

    const equipements = [
      { champ: "Allaitement accepté", label: "Allaitement" },
      { champ: "Couches fournies",    label: "Couches" },
      { champ: "Caméra",              label: "Caméra" },
      { champ: "Jardin",              label: "Jardin" },
      { champ: "Sorties",             label: "Sorties" },
      { champ: "Label qualité",       label: "Label qualité" },
      { champ: "Cuisine sur place",   label: "Cuisine" },
      { champ: "Application parents", label: "App parents" },
    ];

    const calIcon = (stroke) => `<svg viewBox="0 0 24 24" fill="none" stroke="${stroke}" stroke-width="2" width="16" height="16"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>`;
    const houseIcon = (stroke) => `<svg viewBox="0 0 24 24" fill="none" stroke="${stroke}" stroke-width="1.5" width="18" height="18"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>`;

    function getMois(d) { return d ? d.substring(0,7) : ''; }
    function formatMoisLabel(v) { const [y,m] = v.split('-'); return MOIS[parseInt(m)] + ' ' + y; }
    function formatDate(d) {
      if (!d) return 'Non communiquée';
      const [y,m,j] = d.split('-');
      return `${parseInt(j)} ${MOIS[parseInt(m)]} ${y}`;
    }

    let allRecords = [];
    let activeMonth = '';

    function buildMonthBtns() {
      const map = {};
      allRecords.forEach(r => {
        const m = getMois(r.fields["Date de disponibilité"]);
        const p = r.fields["Places disponible"] || 0;
        if (m && p > 0) { map[m] = (map[m]||0) + p; }
      });
      const row = document.getElementById('months-row');
      row.innerHTML = '';
      Object.keys(map).sort().forEach(m => {
        const btn = document.createElement('button');
        btn.className = 'month-btn has-places';
        btn.dataset.val = m;
        btn.innerHTML = `${formatMoisLabel(m)} <span class="dot-count">${map[m]}</span>`;
        btn.onclick = () => selectMonth(m);
        row.appendChild(btn);
      });
    }

    function selectMonth(val) {
      activeMonth = val;
      document.querySelectorAll('.month-btn').forEach(b => b.classList.toggle('active', b.dataset.val === val));
      renderCards();
    }

    function reset() {
      activeMonth = '';
      document.querySelectorAll('.month-btn').forEach(b => b.classList.remove('active'));
      renderCards();
    }

    function renderCards() {
      const container = document.getElementById('places-creches');
      const visibles = allRecords.filter(r => r.fields["Visible sur le site"]);
      const total = visibles.reduce((s,r) => s + (r.fields["Places disponible"]||0), 0);
      document.getElementById('total-places').textContent = total;

      const info = document.getElementById('filter-info');
      let filtered = visibles;
      let hasReal = false;

      if (activeMonth) {
        filtered = visibles.filter(r => {
          const m = getMois(r.fields["Date de disponibilité"]||'');
          const p = r.fields["Places disponible"]||0;
          return p === 0 || (m && m <= activeMonth);
        });
        hasReal = visibles.some(r => {
          const m = getMois(r.fields["Date de disponibilité"]||'');
          const p = r.fields["Places disponible"]||0;
          return p > 0 && m && m <= activeMonth;
        });
        info.textContent = `Places disponibles en ${formatMoisLabel(activeMonth)} — ${filtered.length} crèche${filtered.length>1?'s':''} affichée${filtered.length>1?'s':''}`;
      } else {
        info.textContent = 'Toutes les crèches — sélectionnez un mois pour filtrer';
      }

      let html = '';

      if (activeMonth && !hasReal) {
        html += `<div class="empty-state"><div class="empty-title">Aucune place disponible ce mois</div><div class="empty-sub">Voici les prochaines disponibilités dans nos crèches</div></div>`;
        filtered = visibles;
      }

      html += filtered.map(r => {
        const f = r.fields;
        const nom = Array.isArray(f["Nom de la crèche"]) ? f["Nom de la crèche"][0] : "Crèche";
        const places = f["Places disponible"] || 0;
        const hasPlaces = places > 0;
        const dispo = formatDate(f["Date de disponibilité"]);
        const ageMin = f["Âge minimum (mois)"] ?? "?";
        const ageMax = f["Âge maximum (mois)"] ?? "?";
        const contrat = f["Type de contrat"] || "—";

        const equipHTML = equipements.filter(e => {
          const v = f[e.champ];
          return Array.isArray(v) ? v[0] === true : v === true;
        }).map(e => `<span class="epill"><span class="edot"></span>${e.label}</span>`).join('');

        if (hasPlaces) {
          return `<div class="card">
            <div class="card-top-bar"></div>
            <div class="card-body">
              <div class="card-head">
                <div class="card-left">
                  <div class="avatar">${houseIcon("#8A4CFF")}</div>
                  <span class="cname">${nom}</span>
                </div>
                <span class="badge bp">${places} place${places>1?'s':''}</span>
              </div>
              <div class="date-chip">
                <div class="date-chip-icon">${calIcon("#fff")}</d
